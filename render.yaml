services:
  - type: web
    name: random-test-generator
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/prod.db
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
